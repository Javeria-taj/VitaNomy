<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MetaTwin — Digital Mannequin</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #f5f0e8;
    --cream-dark: #e8e0d0;
    --green: #1a3a2a;
    --green-mid: #2d5a42;
    --green-light: #3d7a5a;
    --gold: #b8960c;
    --gold-light: #d4b44a;
    --red: #c0392b;
    --red-light: #e74c3c;
    --amber: #d4a017;
    --green-ok: #27ae60;
    --purple: #7c5cbf;
    --stroke: #1a3a2a;
    --stroke-light: rgba(26, 58, 42, 0.25);
    --stroke-grid: rgba(26, 58, 42, 0.08);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--cream);
    color: var(--green);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  .twin-container {
    position: relative;
    width: 100%;
    max-width: 900px;
    height: 100vh;
    max-height: 750px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* ── The Mannequin SVG ── */
  .mannequin-wrap {
    position: relative;
    width: 320px;
    height: 680px;
  }

  .mannequin-svg {
    width: 100%;
    height: 100%;
  }

  /* Body segments */
  .body-segment {
    cursor: pointer;
    transition: all 0.3s ease;
  }

  .body-segment:hover .segment-fill {
    stroke: var(--green-light);
    stroke-width: 2.2;
    filter: drop-shadow(0 0 8px rgba(26, 58, 42, 0.2));
  }

  .body-segment.active .segment-fill {
    stroke: var(--gold);
    stroke-width: 2.5;
    filter: drop-shadow(0 0 12px rgba(184, 150, 12, 0.3));
  }

  .body-segment.status-critical .segment-fill {
    stroke: var(--red);
    stroke-width: 2;
    animation: pulse-critical 2s ease-in-out infinite;
  }

  .body-segment.status-warning .segment-fill {
    stroke: var(--amber);
    stroke-width: 1.8;
    animation: pulse-warning 2.5s ease-in-out infinite;
  }

  @keyframes pulse-critical {
    0%, 100% { filter: drop-shadow(0 0 4px rgba(192, 57, 43, 0.2)); }
    50% { filter: drop-shadow(0 0 14px rgba(192, 57, 43, 0.45)); }
  }

  @keyframes pulse-warning {
    0%, 100% { filter: drop-shadow(0 0 3px rgba(212, 160, 23, 0.15)); }
    50% { filter: drop-shadow(0 0 10px rgba(212, 160, 23, 0.35)); }
  }

  /* Joint circles */
  .joint {
    fill: var(--cream);
    stroke: var(--stroke);
    stroke-width: 1.5;
    transition: all 0.3s;
  }

  .body-segment:hover .joint,
  .body-segment.active .joint {
    fill: var(--green);
    stroke: var(--gold);
  }

  .body-segment.active .joint {
    fill: var(--gold);
    stroke: var(--green);
  }

  /* Wireframe grid overlay */
  .grid-line {
    stroke: var(--stroke-grid);
    stroke-width: 0.5;
    fill: none;
    pointer-events: none;
  }

  /* ── Floating Vital Badges ── */
  .vital-badge {
    position: absolute;
    display: flex;
    align-items: center;
    gap: 7px;
    background: var(--cream);
    border: 1.5px solid var(--green);
    border-radius: 6px;
    padding: 6px 12px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    font-weight: 600;
    color: var(--green);
    white-space: nowrap;
    pointer-events: none;
    opacity: 0;
    transform: translateX(8px);
    transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
    box-shadow: 0 2px 12px rgba(26, 58, 42, 0.08);
    z-index: 20;
  }

  .vital-badge.visible {
    opacity: 1;
    transform: translateX(0);
  }

  .vital-badge::before {
    content: '';
    position: absolute;
    left: -8px;
    top: 50%;
    transform: translateY(-50%);
    width: 0; height: 0;
    border-top: 5px solid transparent;
    border-bottom: 5px solid transparent;
    border-right: 7px solid var(--green);
  }

  .vital-badge.left-side::before {
    left: auto;
    right: -8px;
    border-right: none;
    border-left: 7px solid var(--green);
  }

  .vital-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .vital-dot.ok { background: var(--green-ok); }
  .vital-dot.warning { background: var(--amber); }
  .vital-dot.critical { background: var(--red); }
  .vital-dot.info { background: var(--purple); }

  /* Connection lines from badge to body */
  .connector-line {
    position: absolute;
    height: 1.5px;
    background: var(--green);
    transform-origin: left center;
    opacity: 0;
    transition: opacity 0.3s;
    pointer-events: none;
    z-index: 15;
  }

  .connector-line.visible { opacity: 0.3; }

  /* ── Detail Panel (appears on click) ── */
  .detail-card {
    position: absolute;
    right: -340px;
    top: 50%;
    transform: translateY(-50%) translateX(20px);
    width: 300px;
    background: var(--cream);
    border: 2px solid var(--green);
    border-radius: 12px;
    padding: 24px;
    opacity: 0;
    pointer-events: none;
    transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
    box-shadow: 0 8px 32px rgba(26, 58, 42, 0.1);
    z-index: 30;
  }

  .detail-card.visible {
    opacity: 1;
    transform: translateY(-50%) translateX(0);
    pointer-events: auto;
  }

  .detail-card-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
    padding-bottom: 12px;
    border-bottom: 1px solid var(--stroke-light);
  }

  .detail-card-title {
    font-family: 'DM Serif Display', serif;
    font-size: 20px;
    color: var(--green);
  }

  .detail-status {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    font-weight: 600;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    padding: 3px 10px;
    border-radius: 4px;
    border: 1.5px solid;
  }

  .detail-status.healthy { color: var(--green-ok); border-color: var(--green-ok); background: rgba(39,174,96,0.08); }
  .detail-status.warning { color: var(--amber); border-color: var(--amber); background: rgba(212,160,23,0.08); }
  .detail-status.critical { color: var(--red); border-color: var(--red); background: rgba(192,57,43,0.08); }

  .detail-stats {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 16px;
  }

  .detail-stat {
    background: rgba(26, 58, 42, 0.04);
    border-radius: 8px;
    padding: 10px;
  }

  .detail-stat-label {
    font-size: 9px;
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: rgba(26, 58, 42, 0.45);
    margin-bottom: 4px;
  }

  .detail-stat-value {
    font-family: 'JetBrains Mono', monospace;
    font-size: 16px;
    font-weight: 700;
  }

  .detail-stat-value.ok { color: var(--green-ok); }
  .detail-stat-value.warn { color: var(--amber); }
  .detail-stat-value.crit { color: var(--red); }

  .detail-risk {
    margin-bottom: 14px;
  }

  .detail-risk-label {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: rgba(26, 58, 42, 0.45);
    margin-bottom: 6px;
  }

  .risk-track {
    height: 6px;
    background: rgba(26, 58, 42, 0.08);
    border-radius: 3px;
    overflow: hidden;
  }

  .risk-fill {
    height: 100%;
    border-radius: 3px;
    transition: width 0.6s ease;
  }

  .detail-alert {
    font-size: 12px;
    color: rgba(26, 58, 42, 0.65);
    line-height: 1.6;
    padding: 10px 12px;
    border-left: 3px solid var(--red);
    background: rgba(192, 57, 43, 0.04);
    border-radius: 0 6px 6px 0;
    margin-top: 10px;
  }

  .detail-alert.warn-alert {
    border-left-color: var(--amber);
    background: rgba(212, 160, 23, 0.04);
  }

  .detail-close {
    position: absolute;
    top: 12px; right: 12px;
    width: 24px; height: 24px;
    border: 1px solid var(--stroke-light);
    border-radius: 4px;
    background: transparent;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    color: var(--green);
    transition: all 0.2s;
  }

  .detail-close:hover {
    background: var(--green);
    color: var(--cream);
  }

  /* ── Scan animation ── */
  .scan-line {
    position: absolute;
    left: 20px;
    right: 20px;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--green-light), transparent);
    opacity: 0.2;
    animation: scanDown 5s ease-in-out infinite;
    pointer-events: none;
    z-index: 5;
  }

  @keyframes scanDown {
    0% { top: 5%; }
    50% { top: 92%; }
    100% { top: 5%; }
  }

  /* ── Responsive ── */
  @media (max-width: 700px) {
    .detail-card {
      right: auto;
      left: 50%;
      top: auto;
      bottom: 20px;
      transform: translateX(-50%) translateY(20px);
      width: 90vw;
    }
    .detail-card.visible {
      transform: translateX(-50%) translateY(0);
    }
    .vital-badge { font-size: 10px; padding: 4px 9px; }
  }
</style>
</head>
<body>

<div class="twin-container" id="twinContainer">

</div>

<script>
// ── Data ──
const zoneData = {
  head: {
    name: 'Brain', status: 'healthy',
    stats: [
      { l: 'Cognitive', v: '94/100', c: 'ok' },
      { l: 'Sleep', v: '78%', c: 'ok' },
      { l: 'Stress', v: '32/100', c: 'ok' },
      { l: 'Neural', v: 'Normal', c: 'ok' }
    ],
    risk: 12,
    alert: null
  },
  chest: {
    name: 'Heart & Lungs', status: 'warning',
    stats: [
      { l: 'Heart Rate', v: '88 bpm', c: 'warn' },

// ── Interactions ──
let activeZone = null;

document.querySelectorAll('.body-segment').forEach(seg => {
  seg.addEventListener('click', (e) => {
    e.stopPropagation();
    const zone = seg.dataset.zone;
    if (!zone || !zoneData[zone]) return;
    selectZone(zone);
  });
});

function selectZone(zone) {
  // Remove previous active
  document.querySelectorAll('.body-segment').forEach(s => s.classList.remove('active'));

  // Set new active on all segments with same zone
  document.querySelectorAll(`[data-zone="${zone}"]`).forEach(s => s.classList.add('active'));

  activeZone = zone;
  showDetail(zone);
}

function showDetail(zone) {
  const data = zoneData[zone];
  const card = document.getElementById('detailCard');
  const inner = document.getElementById('detailInner');

  const riskColor = data.risk > 60 ? 'var(--red)' : data.risk > 30 ? 'var(--amber)' : 'var(--green-ok)';

  let html = `
    <div class="detail-card-header">
      <div class="detail-card-title">${data.name}</div>
      <div class="detail-status ${data.status}">${data.status}</div>
    </div>
    <div class="detail-stats">
      ${data.stats.map(s => `
        <div class="detail-stat">
          <div class="detail-stat-label">${s.l}</div>
          <div class="detail-stat-value ${s.c}">${s.v}</div>
        </div>
      `).join('')}
    </div>
    <div class="detail-risk">
      <div class="detail-risk-label">Risk Score — ${data.risk}%</div>
      <div class="risk-track">
        <div class="risk-fill" style="width:${data.risk}%; background: linear-gradient(90deg, var(--green-ok), ${riskColor});"></div>
      </div>
    </div>
  `;

  if (data.alert) {
    const alertClass = data.status === 'critical' ? '' : 'warn-alert';
    html += `<div class="detail-alert ${alertClass}">${data.alert}</div>`;
  }

  inner.innerHTML = html;
  card.classList.add('visible');
}

function closeDetail() {
  document.getElementById('detailCard').classList.remove('visible');
  document.querySelectorAll('.body-segment').forEach(s => s.classList.remove('active'));
  activeZone = null;
}

// Close on outside click
document.addEventListener('click', (e) => {
  if (!e.target.closest('.body-segment') && !e.target.closest('.detail-card')) {
    closeDetail();
  }
});

// ── Animate badges in on load ──
setTimeout(() => {
  document.querySelectorAll('.vital-badge').forEach((badge, i) => {
    badge.style.transitionDelay = (i * 0.12) + 's';
    badge.classList.add('visible');
  });
}, 300);
</script>
